name: CD - Deploy to AWS Lambda

on:
  push:
    branches:
      - main
      - ci-cd-pipeline
      - store-login
      - test-alerts

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Create Lambda deployment package
      run: |
        mkdir package
        
        # Install dependencies using specific platform flags for AWS Lambda compatibility
        if [ -f requirements.txt ]; then 
          pip install \
            --platform manylinux2014_x86_64 \
            --target ./package \
            --implementation cp \
            --python-version 3.10 \
            --only-binary=:all: \
            -r requirements.txt
        fi
        
        cp -r src/* ./package/
        cd package
        zip -r ../function.zip .

    - name: Configure AWS Credentials using OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::164885464205:role/GitHubActionsLambdaDeployRole
        aws-region: us-east-1

    - name: Deploy Lambda function
      env:
        ACCOUNT_ID: 164885464205
        EXECUTION_ROLE: RescuLambdaExecutionRole
      run: |
        FUNCTION_NAME="rescu-api"
        
        if aws lambda get-function --function-name $FUNCTION_NAME > /dev/null 2>&1; then
          echo "Function $FUNCTION_NAME exists. Updating code..."
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://function.zip \
            --publish
          aws lambda wait function-updated --function-name $FUNCTION_NAME
        else
          echo "Function $FUNCTION_NAME does not exist. Creating it now..."
          aws lambda create-function \
            --function-name $FUNCTION_NAME \
            --runtime python3.10 \
            --handler lambda_function.lambda_handler \
            --role arn:aws:iam::$ACCOUNT_ID:role/$EXECUTION_ROLE \
            --zip-file fileb://function.zip \
            --timeout 15 \
            --memory-size 128
        fi
        
    - name: Deploy Frontend to Elastic Beanstalk
      run: |
        cd frontend
        zip -r ../beanstalk-deploy.zip .
        cd ..

        aws s3 cp beanstalk-deploy.zip s3://rescu-frontend/deploy-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}.zip

        aws elasticbeanstalk create-application-version \
          --application-name rescu-frontend \
          --version-label ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }} \
          --source-bundle S3Bucket="rescu-frontend",S3Key="deploy-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}.zip"

        aws elasticbeanstalk update-environment \
          --application-name rescu-frontend \
          --environment-name Rescu-frontend-env \
          --version-label ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}