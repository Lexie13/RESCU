<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Info</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inner.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="inner-wrapper">

    <header class="page-header">
        <p class="site-name">R.E.S.C.U.</p>
        <h2>Account Info</h2>
        <p>Update your personal details below.</p>
    </header>

    <div class="page-card">
        <form id="profile-form" action="{{ url_for('edit_profile') }}" method="POST" onsubmit="return validateForm()">

            <!-- Role -->
            <label class="field-label">Role</label>
            <div class="role-buttons">
                <input type="radio" name="role" id="role-owner"     value="owner"
                       {% if user.role != 'caregiver' %}checked{% endif %}>
                <label for="role-owner">Owner</label>
                <input type="radio" name="role" id="role-caregiver" value="caregiver"
                       {% if user.role == 'caregiver' %}checked{% endif %}>
                <label for="role-caregiver">Caregiver</label>
            </div>

            <!-- Name -->
            <div class="field-row">
                <div>
                    <label class="field-label" for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name"
                           value="{{ user.first_name or '' }}" placeholder="First Name" required>
                </div>
                <div>
                    <label class="field-label" for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name"
                           value="{{ user.last_name or '' }}" placeholder="Last Name" required>
                </div>
            </div>

            <!-- Phone -->
            <label class="field-label" for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone"
                   value="{{ user.phone or '' }}" placeholder="Phone Number" required>

            <!-- Email -->
            <label class="field-label" for="email">Email Address</label>
            <input type="email" id="email" name="email"
                   value="{{ user.email or '' }}" placeholder="Email Address" required>

            <!-- Username (display only) -->
            <label class="field-label">Username</label>
            <input type="text" value="{{ username }}" disabled
                   style="background:#f0f0f0; color:#999; cursor:not-allowed;">

            <hr>

            <!-- Password -->
            <div class="password-section">
                <label class="field-label">Password</label>
                <button type="button" class="btn-secondary" onclick="togglePassword(this)">
                    Change Password
                </button>
                <div class="password-fields" id="password-fields">
                    <label class="field-label" for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" placeholder="New Password">
                    <label class="field-label" for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password">
                </div>
            </div>

            {% if error %}
            <div class="error-msg show">{{ error }}</div>
            {% endif %}
            <div class="error-msg" id="pw-error">Passwords do not match.</div>

            <button type="submit" class="btn-primary" id="save-btn">Save Changes</button>
        </form>
    </div>

    <a href="{{ url_for('home') }}" class="back-link">← Back to Dashboard</a>
</div>

<script>
function togglePassword(btn) {
    const fields = document.getElementById('password-fields');
    const open = fields.classList.toggle('open');
    btn.textContent = open ? 'Cancel' : 'Change Password';
    if (!open) {
        document.getElementById('new_password').value = '';
        document.getElementById('confirm_password').value = '';
    }
}

function validateForm() {
    const fields = document.getElementById('password-fields');
    const err    = document.getElementById('pw-error');
    if (fields.classList.contains('open')) {
        const np = document.getElementById('new_password').value;
        const cp = document.getElementById('confirm_password').value;
        if (np && np !== cp) {
            err.classList.add('show');
            setTimeout(() => err.classList.remove('show'), 3000);
            return false;
        }
    }
    return true;
}

document.getElementById('profile-form').addEventListener('submit', function(e) {
    if (!validateForm()) { e.preventDefault(); return; }
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ Saved!';
    btn.classList.add('saved');
});
</script>
</body>
</html>
