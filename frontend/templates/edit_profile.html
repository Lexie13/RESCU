<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Account Info</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inner.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        .inner-wrapper.vertical-bg {
            background: linear-gradient(180deg, #1E90FF, #800080);
        }

        .page-header h2 {
            font-size: clamp(2.2rem, 6vw, 3.2rem);
            margin-bottom: 10px;
        }

        /* --- Per-field save layout --- */
        .field-group {
            margin-bottom: 20px;
        }

        .field-group-inner {
            display: flex;
            gap: 10px;
            align-items: stretch;
            margin-top: 6px;
        }

        .field-group-inner input,
        .field-group-inner .field-row {
            flex: 1;
        }

        .field-group-inner input {
            margin: 0;
        }

        .btn-save-inline {
            background: #1E90FF;
            color: white;
            border: none;
            padding: 0 18px;
            height: 36px;
            align-self: center;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.25s, transform 0.1s;
            flex-shrink: 0;
        }

        .btn-save-inline:hover { background: #104E8B; }
        .btn-save-inline.saved { background: #104E8B; cursor: default; }

        .btn-save-pw {
            display: block;
            width: 100%;
            padding: 13px;
            margin-top: 14px;
            border: none;
            border-radius: 8px;
            background: #1E90FF;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            transition: background 0.25s;
        }

        .btn-save-pw:hover { background: #104E8B; }
        .btn-save-pw.saved { background: #104E8B; cursor: default; }

        .btn-delete-account {
            margin-top: 20px;
            background: transparent;
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Roboto', sans-serif;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-delete-account:hover {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>
<div class="inner-wrapper vertical-bg">

    <header class="page-header">
        <h2>Account Info</h2>
        <p>Update your personal details below.</p>
    </header>

    <div class="page-card">

        <hr>

        <!-- First Name -->
        <div class="field-group">
            <label class="field-label">First Name</label>
            <div class="field-group-inner">
                <input type="text" id="first_name" name="first_name"
                       value="{{ user.first_name or '' }}" placeholder="First Name">
                <button class="btn-save-inline" onclick="saveField(this, 'first_name')">Save</button>
            </div>
        </div>

        <!-- Last Name -->
        <div class="field-group">
            <label class="field-label">Last Name</label>
            <div class="field-group-inner">
                <input type="text" id="last_name" name="last_name"
                       value="{{ user.last_name or '' }}" placeholder="Last Name">
                <button class="btn-save-inline" onclick="saveField(this, 'last_name')">Save</button>
            </div>
        </div>

        <!-- Email -->
        <div class="field-group">
            <label class="field-label">Email Address</label>
            <div class="field-group-inner">
                <input type="email" id="email" name="email"
                       value="{{ user.email or '' }}" placeholder="Email Address">
                <button class="btn-save-inline" onclick="saveField(this, 'email')">Save</button>
            </div>
        </div>

        <!-- Username (read-only) -->
        <div class="field-group">
            <label class="field-label">Username</label>
            <input type="text" value="{{ username }}" disabled
                   style="margin-top:6px; background:#f0f0f0; color:#999; cursor:not-allowed;">
        </div>

        <hr>

        <!-- Password -->
        <div>
            <label class="field-label">Password</label>
            <div style="margin-top: 6px;">
                <button type="button" class="btn-secondary" onclick="togglePassword(this)">
                    Change Password
                </button>
            </div>
            <div class="password-fields" id="password-fields">
                <label class="field-label" for="new_password" style="margin-top: 12px;">New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="New Password">
                <label class="field-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm New Password">
                <div class="error-msg" id="pw-error">Passwords do not match.</div>
                <button class="btn-save-pw" onclick="savePassword(this)">Save Password</button>
            </div>
        </div>

        {% if error %}
        <div class="error-msg show" style="margin-top: 16px;">{{ error }}</div>
        {% endif %}

        <hr>

        <div style="text-align: center; padding-top: 4px;">
            <button class="btn-delete-account" onclick="document.getElementById('delete-modal').style.display='flex'">
                Delete Account
            </button>
        </div>

    </div>

    <a href="{{ url_for('home') }}" class="back-link">← Back to Dashboard</a>
</div>

<!-- Delete Confirmation Modal -->
<div id="delete-modal" style="display:none; position:fixed; z-index:999; inset:0; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
    <div style="background:white; border-radius:16px; padding:30px; width:85%; max-width:380px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.4);">
        <h3 style="color:#cc0000; margin-top:0; font-family:'Montserrat',sans-serif;">Delete Account?</h3>
        <p style="color:#555; font-size:14px; margin-bottom:24px;">This will permanently delete your account and all associated data. This action cannot be undone.</p>
        <button onclick="deleteAccount()" style="background:#cc0000; color:white; border:none; padding:13px; width:100%; border-radius:8px; font-size:15px; font-weight:700; font-family:'Roboto',sans-serif; cursor:pointer; margin-bottom:10px;">
            Yes, Delete My Account
        </button>
        <button onclick="document.getElementById('delete-modal').style.display='none'" style="background:#f0f0f0; color:#555; border:none; padding:13px; width:100%; border-radius:8px; font-size:15px; font-weight:700; font-family:'Roboto',sans-serif; cursor:pointer;">
            Cancel
        </button>
    </div>
</div>

<script>
// Toggle Password Section
function togglePassword(btn) {
    const fields = document.getElementById('password-fields');
    const isOpen = fields.classList.toggle('open');
    fields.style.display = isOpen ? 'block' : 'none';
    btn.textContent = isOpen ? 'Cancel' : 'Change Password';
}

// Save Individual Fields
function saveField(btn, field) {
    const formData = new FormData();
    
    if (field === 'role') {
        const selected = document.querySelector('input[name="role"]:checked');
        if (!selected) return;
        formData.append('role', selected.value);
    } else {
        const input = document.getElementById(field);
        if (!input) return;
        formData.append(field, input.value.trim());
    }

    // Notice we DON'T use JSON.stringify here so request.form works in Python
    fetch("{{ url_for('edit_profile') }}", {
        method: 'POST',
        body: formData 
    })
    .then(res => {
        if (!res.ok) throw new Error('Save failed');
        const origText = btn.textContent;
        btn.textContent = '✓ Saved!';
        btn.classList.add('saved');
        setTimeout(() => {
            btn.textContent = origText;
            btn.classList.remove('saved');
        }, 1500);
    })
    .catch(err => alert('Error saving: ' + err));
}

// Save Password
function savePassword(btn) {
    const np = document.getElementById('new_password').value;
    const cp = document.getElementById('confirm_password').value;

    if (!np || np !== cp) {
        document.getElementById('pw-error').style.display = 'block';
        return;
    }

    const formData = new FormData();
    formData.append('new_password', np);
    formData.append('confirm_password', cp);

    fetch("{{ url_for('edit_profile') }}", {
        method: 'POST',
        body: formData
    })
    .then(res => {
        if (!res.ok) throw new Error('Failed');
        btn.textContent = '✓ Updated!';
        setTimeout(() => {
            location.reload(); // Reload to clear fields and hide section
        }, 1000);
    })
    .catch(() => alert('Error updating password.'));
}

// Delete Account
function deleteAccount() {
    fetch("{{ url_for('delete_account') }}", {
        method: 'POST'
    })
    .then(res => {
        if (res.ok) {
            window.top.location.href = "{{ url_for('index') }}";
        } else {
            alert('Delete failed on server.');
        }
    })
    .catch(() => alert('Network error.'));
}
</script>
</body>
</html>
