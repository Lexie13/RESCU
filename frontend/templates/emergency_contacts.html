<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Emergency Contacts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='emergency_contacts.css') }}">
</head>
<body>
<div class="main-wrapper">
    <header class="hero-section">
        <h1>Emergency Contacts</h1>
        <p>Rank your contacts in order of priority (1-5).</p>
    </header>

    <div class="contacts-manager-card">
        <form action="{{ url_for('edit_emergency_contacts') }}" method="POST" id="contacts-form">
            <div id="contact-list">
                {% for contact in contacts %}
                <div class="contact-row">
                    <span class="rank-number">{{ loop.index }}</span>
                    
                    <div class="order-controls">
                        <button type="button" class="move-btn" onclick="moveUp(this)">▲</button>
                        <button type="button" class="move-btn" onclick="moveDown(this)">▼</button>
                    </div>
                    
                    <input type="text" name="contact_name" value="{{ contact.name }}" placeholder="Name" required>
                    <input type="tel" name="contact_phone" value="{{ contact.phone }}" placeholder="Phone" required>
                    
                    <button type="button" class="delete-btn" onclick="removeRow(this)">✕</button>
                </div>
                {% endfor %}
            </div>

            <div class="form-footer">
                <button type="button" class="secondary-btn" onclick="addContactRow()">+ Add New</button>
                <div class="action-buttons">
                    <a href="{{ url_for('home') }}" class="cancel-btn">Cancel</a>
                    <button type="submit" class="save-btn">Save Changes</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
// Updates the 1-5 numbering based on current position in the list
function updateRanks() {
    const rows = document.querySelectorAll('.contact-row');
    rows.forEach((row, index) => {
        const rankSpan = row.querySelector('.rank-number');
        if (rankSpan) {
            rankSpan.innerText = index + 1;
        }
    });
}

function addContactRow() {
    const list = document.getElementById('contact-list');
    
    // Prevent adding more than 5
    if (list.children.length >= 5) {
        alert("Maximum of 5 contacts allowed.");
        return;
    }
    
    const row = document.createElement('div');
    row.className = 'contact-row';
    row.innerHTML = `
        <span class="rank-number"></span>
        <div class="order-controls">
            <button type="button" class="move-btn" onclick="moveUp(this)">▲</button>
            <button type="button" class="move-btn" onclick="moveDown(this)">▼</button>
        </div>
        <input type="text" name="contact_name" placeholder="Name" required>
        <input type="tel" name="contact_phone" placeholder="Phone" required>
        <button type="button" class="delete-btn" onclick="removeRow(this)">✕</button>
    `;
    list.appendChild(row);
    updateRanks();
}

function removeRow(btn) {
    const row = btn.closest('.contact-row');
    row.remove();
    updateRanks();
}

function moveUp(btn) {
    const row = btn.closest('.contact-row');
    const previous = row.previousElementSibling;
    if (previous) {
        row.parentNode.insertBefore(row, previous);
        updateRanks();
    }
}

function moveDown(btn) {
    const row = btn.closest('.contact-row');
    const next = row.nextElementSibling;
    if (next) {
        row.parentNode.insertBefore(next, row);
        updateRanks();
    }
}

// Ensure ranks are correct on initial load
window.onload = updateRanks;
</script>
</body>
</html>
