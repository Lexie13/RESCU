<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R.E.S.C.U. Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
    <header class="hero-section">
        <h1>Welcome, {{ username }}!</h1>
        <p class="user-email">{{ email }}</p>
    </header>

    <hr class="full-separator">

    <section class="status-container">
        <div class="status-card">
            <span class="label">Battery Status</span>
            <span id="battery-val" class="value">{{ device.battery }}</span>
        </div>
        <div class="status-card">
            <span class="label">Connection</span>
            <span id="connection-status" class="value online">{{ device.status }}</span>
        </div>
    </section>

    <div style="text-align: center; margin-bottom: 20px;">
        <button id="connect-ble" class="action-item" style="background: #1E90FF; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
            Connect to RESCU Device
        </button>
    </div>

    <nav class="action-list">
        <a href="{{ url_for('edit_profile') }}" class="action-item" target="content-frame">
            <span>Account Info</span>
            <span class="arrow">→</span>
        </a>
        <a href="{{ url_for('device_status') }}" class="action-item" target="content-frame">
            <span>Device Settings</span>
            <span class="arrow">→</span>
        </a>
        <a href="{{ url_for('edit_emergency_contacts') }}" class="action-item" target="content-frame">
            <span>Emergency Contacts</span>
            <span class="arrow">→</span>
        </a>
        <a href="{{ url_for('fall_history') }}" class="action-item" target="content-frame">
            <span>Fall History</span>
            <span class="arrow">→</span>
        </a>
    </nav>

    <footer>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </footer>
</div>

<script>
const connectBtn = document.getElementById('connect-ble');
const statusEl = document.getElementById('connection-status');

// 1. Trigger connection in the Parent Shell
connectBtn.addEventListener('click', () => {
    statusEl.textContent = "Searching...";
    window.parent.postMessage("CONNECT_BLE", "*");
});

// 2. Listen for status updates from the Parent Shell
// Inside home.html script
const batteryEl = document.getElementById('battery-val');

window.addEventListener("message", (event) => {
    // 1. Handle Connection Status
    if (event.data.type === "STATUS") {
        statusEl.textContent = event.data.value;
        statusEl.style.color = "#4df153";
        statusEl.classList.add("online");
    }

    // 2. Handle Battery Updates (Restored Functionality)
    if (event.data.type === "BATTERY_UPDATE") {
        batteryEl.textContent = event.data.value;
    }
});
</script>
</body>
</html>
