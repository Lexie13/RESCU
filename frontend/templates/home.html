<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>R.E.S.C.U. Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='inner.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            background: linear-gradient(to bottom, #1E90FF, #800080) !important;
            margin: 0;
            min-height: 100%;
            font-family: 'Roboto', sans-serif;
        }

        .inner-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .page-header h2 {
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            margin-top: 10px;
            text-align: center;
            color: white;
        }

        .page-header p {
            text-align: center;
            color: white;
            opacity: 0.9;
        }

        .status-row,
        .btn-ble,
        .nav-container,
        .nav-card {
            width: 100%;
            max-width: 600px;
        }

        .nav-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 12px;
            padding: 24px 28px;
            text-decoration: none;
            color: #1E90FF;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.15s, box-shadow 0.15s;
            margin-bottom: 16px;
        }

        .nav-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .btn-ble {
            background: #800080 !important;
            color: white !important;
            padding: 20px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s !important;
            margin-bottom: 24px;
        }

        .btn-ble:hover {
            background: #800080 !important;
            transform: translateY(-2px);
        }

        .btn-ble:active {
            background: #800080 !important;
            transform: scale(0.98);
        }

        .status-red { color: #ff4d4d !important; }
        .status-green { color: #2ecc71 !important; }

        @media (max-width: 600px) {
            .status-row { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="inner-wrapper">

        <header class="page-header">
            <h2>Welcome, {{ username }}!</h2>
            <p>{{ email }}</p>
        </header>

        <div class="status-row">
            <div class="status-card">
                <div class="s-label">Battery</div>
                <div id="battery-val" class="s-value">{{ device.battery }}</div>
            </div>
            <div class="status-card">
                <div class="s-label">Connection</div>
                <div id="connection-status" class="s-value status-red">{{ device.status }}</div>
            </div>
        </div>

        <button id="connect-ble" class="btn-ble">Connect to RESCU Device</button>

        <div class="nav-container">
            <a href="{{ url_for('edit_profile') }}" class="nav-card">
                <span>Account Info</span>
                <span class="arrow">→</span>
            </a>
            <a href="{{ url_for('device_status') }}" class="nav-card">
                <span>Device Settings</span>
                <span class="arrow">→</span>
            </a>
            <a href="{{ url_for('edit_emergency_contacts') }}" class="nav-card">
                <span>Emergency Contacts</span>
                <span class="arrow">→</span>
            </a>
            <a href="{{ url_for('fall_history') }}" class="nav-card">
                <span>Fall History</span>
                <span class="arrow">→</span>
            </a>
        </div>

        <a href="{{ url_for('logout') }}" class="logout-link">Logout</a>

    </div><!-- END .inner-wrapper -->

    <script>
    const connectBtn = document.getElementById('connect-ble');
    const statusEl = document.getElementById('connection-status');
    const batteryEl = document.getElementById('battery-val');

    let isConnected = false;

    function updateConnectionUI(connected, statusText) {
        isConnected = connected;
        statusEl.textContent = statusText;

        if (connected) {
            statusEl.classList.remove("status-red");
            statusEl.classList.add("status-green");
            connectBtn.textContent = "Disconnect from RESCU Device";
            connectBtn.style.background = "#cc0000";
        } else {
            statusEl.classList.remove("status-green");
            statusEl.classList.add("status-red");
            connectBtn.textContent = "Connect to RESCU Device";
            connectBtn.style.background = "#800080";
        }
    }

    connectBtn.addEventListener('click', () => {
        if (isConnected) {
            window.parent.postMessage("DISCONNECT_BLE", "*");
            updateConnectionUI(false, "Disconnected");
        } else {
            statusEl.textContent = "Searching...";
            window.parent.postMessage("CONNECT_BLE", "*");
        }
    });

    window.addEventListener("message", (event) => {
        if (event.data.type === "STATUS" && event.data.value === "Connected") {
            updateConnectionUI(true, "Connected");
        }

        if (event.data.type === "DISCONNECTED") {
            updateConnectionUI(false, "Disconnected");
        }

        if (event.data.type === "BATTERY_UPDATE") {
            batteryEl.textContent = event.data.value;
        }
    });
    </script>

</body>
</html>
