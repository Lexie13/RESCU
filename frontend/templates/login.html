<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>R.E.S.C.U. Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>R.E.S.C.U.</h1>

    <div class="form-container">
        <!-- Traditional Login Form -->
        <form action="/login" method="post" class="horizontal-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            {% if error %}
            <div class="error show">{{ error }}</div>
            {% endif %}
            <button type="submit">Login</button>
        </form>

        <!-- Optional OR separator -->
        <p class="or-text">OR</p>

        <!-- OAuth Login Buttons -->
        <div class="oauth-buttons">
            <a href="{{ url_for('login_google') }}"><button type="button" class="google-btn">Login with Google</button></a>
            <a href="{{ url_for('login_microsoft') }}"><button type="button" class="microsoft-btn">Login with Microsoft</button></a>
        </div>

        <!-- Signup link -->
        <p class="signup-text">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>
</body>
</html>
