<div class="form-section">
    <div class="form-container">
        <form action="/signup" method="post">
            <h2>Create Account</h2>
            <p class="subtext">Select your role and enter your details.</p>

            <div class="role-slider-container">
                <div class="role-slider">
                    <input type="radio" name="role" id="owner" value="owner" checked>
                    <label for="owner" class="slider-label">Owner</label>

                    <input type="radio" name="role" id="caregiver" value="caregiver">
                    <label for="caregiver" class="slider-label">Caregiver</label>
                    
                    <div class="slider-tab"></div>
                </div>
            </div>

            <input type="text" name="username" placeholder="Username" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            {% if error %}
            <div class="error show">{{ error }}</div>
            {% endif %}

            <button type="submit">Sign Up</button>
        </form>

        <p class="login-link">
            <a href="{{ url_for('index') }}">← Go Back</a>
        </p>
    </div>
</div>
