<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>

<div class="form-container">
    <h2>Create Account</h2>

    <form action="{{ url_for('signup') }}" method="POST" onsubmit="return validatePasswords()">

        <div class="role-toggle-wrapper">
            <div class="role-toggle" id="roleToggle" onclick="toggleRole()">
                <div class="toggle-slider" id="toggleSlider"></div>
                <span class="toggle-label active" id="labelOwner">Owner</span>
                <span class="toggle-label" id="labelCaregiver">Caregiver</span>
            </div>
        </div>
        <input type="hidden" name="role" id="roleInput" value="owner">

        <input type="text" name="first_name" placeholder="First Name" required>

        <input type="text" name="last_name" placeholder="Last Name" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" id="password" name="password" placeholder="Password" required>

        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>

        <div class="error" id="error-message">Passwords do not match!</div>

        <button type="submit">Sign Up</button>
    </form>

    <div class="login-link">
        <a href="{{ url_for('index') }}">Back to Login</a>
    </div>
</div>

<script>
    let currentRole = 'owner';

    function toggleRole() {
        const slider = document.getElementById('toggleSlider');
        const labelOwner = document.getElementById('labelOwner');
        const labelCaregiver = document.getElementById('labelCaregiver');
        const roleInput = document.getElementById('roleInput');

        if (currentRole === 'owner') {
            currentRole = 'caregiver';
            slider.style.transform = 'translateX(100%)';
            labelOwner.classList.remove('active');
            labelCaregiver.classList.add('active');
        } else {
            currentRole = 'owner';
            slider.style.transform = 'translateX(0)';
            labelOwner.classList.add('active');
            labelCaregiver.classList.remove('active');
        }
        roleInput.value = currentRole;
    }

    function validatePasswords() {
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm_password").value;
        const errorMessage = document.getElementById("error-message");

        if (password !== confirmPassword) {
            errorMessage.classList.add("show");
            setTimeout(() => errorMessage.classList.remove("show"), 3000);
            return false;
        }

        errorMessage.classList.remove("show");
        return true;
    }
</script>

</body>
</html>
